name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine bump level from PR labels
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"release:major"'; then
            LEVEL=major
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            LEVEL=minor
          else
            LEVEL=patch
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "Bump level: $LEVEL"

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            VER="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
            case "${{ steps.bump.outputs.level }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST:-<none>} — next: $NEXT"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.next }}" \
            --target main \
            --title "${{ steps.version.outputs.next }}" \
            --generate-notes
